<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>{{ title|default("SF Pulse") }}</title>
    <meta name="description" content="Track new San Francisco restaurant openings. Updated daily." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#171614" />
    <link rel="icon" type="image/png" href="/static/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <link rel="alternate" type="application/rss+xml" title="SF Pulse" href="/api/rss.xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles/global.css" />
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    {% block body %}{% endblock %}
  </body>
</html>
